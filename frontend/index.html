<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影像Hot · 消费电子影像资讯聚合</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">📷</span>
      <h1>影像<span class="logo-accent">Hot</span></h1>
      <span class="logo-sub">消费电子影像资讯聚合</span>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索文章标题、摘要..." autocomplete="off">
      <span class="search-icon">🔍</span>
    </div>
  </div>
</header>

<nav class="tag-bar" id="tagBar">
  <div class="tag-bar-inner">
    <button class="tag-chip active" data-tag="">全部</button>
    <!-- Dynamically populated -->
  </div>
</nav>

<main class="content" id="content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>加载中...</p>
  </div>
  <div class="error" id="error" style="display:none">
    <p>数据加载失败，请稍后刷新重试。</p>
  </div>
  <div class="empty" id="empty" style="display:none">
    <p>暂无匹配的资讯</p>
  </div>
  <div class="article-list" id="articleList">
    <!-- Dynamically populated -->
  </div>
</main>

<footer class="footer">
  <p>影像Hot · 消费电子影像资讯聚合 · 数据每6小时自动更新</p>
  <p class="footer-disclaimer">内容来自公开信源，点击跳转原文，不存储正文内容</p>
</footer>

<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>

</body>
</html>
